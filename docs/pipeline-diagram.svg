<svg viewBox="0 0 680 175" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif">
<title>CI/CD pipeline flow diagram</title>
<desc>Left-to-right pipeline: Source, Checkout, Build, Push, Deploy, Smoke Test, then Success or Rollback</desc>
<style>
.box1{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}
.box2{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5}
.box3{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5}
.box4{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}
.box5{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5}
.box6{fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5}
.box7{fill:#EAF3DE;stroke:#3B6D11;stroke-width:0.5}
.box8{fill:#FCEBEB;stroke:#A32D2D;stroke-width:0.5}
.t1{fill:#444441}.u1{fill:#5F5E5A}
.t2{fill:#0C447C}.u2{fill:#185FA5}
.t3{fill:#3C3489}.u3{fill:#534AB7}
.t4{fill:#085041}.u4{fill:#0F6E56}
.t5{fill:#712B13}.u5{fill:#993C1D}
.t6{fill:#633806}.u6{fill:#854F0B}
.t7{fill:#27500A}.u7{fill:#3B6D11}
.t8{fill:#791F1F}.u8{fill:#A32D2D}
.lbl{font-size:12px;font-weight:600}
.sub{font-size:10px}
.ln{stroke:#888780;stroke-width:1.2;fill:none}
.note{fill:#888780;font-size:10px}
@media (prefers-color-scheme:dark){
.box1{fill:#444441;stroke:#B4B2A9}
.box2{fill:#0C447C;stroke:#85B7EB}
.box3{fill:#3C3489;stroke:#AFA9EC}
.box4{fill:#085041;stroke:#5DCAA5}
.box5{fill:#712B13;stroke:#F0997B}
.box6{fill:#633806;stroke:#EF9F27}
.box7{fill:#27500A;stroke:#97C459}
.box8{fill:#791F1F;stroke:#F09595}
.t1{fill:#D3D1C7}.u1{fill:#B4B2A9}
.t2{fill:#B5D4F4}.u2{fill:#85B7EB}
.t3{fill:#CECBF6}.u3{fill:#AFA9EC}
.t4{fill:#9FE1CB}.u4{fill:#5DCAA5}
.t5{fill:#F5C4B3}.u5{fill:#F0997B}
.t6{fill:#FAC775}.u6{fill:#EF9F27}
.t7{fill:#C0DD97}.u7{fill:#97C459}
.t8{fill:#F7C1C1}.u8{fill:#F09595}
.ln{stroke:#B4B2A9}
.note{fill:#B4B2A9}
}
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Stage 1: Source (gray) -->
<rect x="10" y="50" width="88" height="56" rx="8" class="box1"/>
<text x="54" y="72" text-anchor="middle" dominant-baseline="central" class="lbl t1">Source</text>
<text x="54" y="90" text-anchor="middle" dominant-baseline="central" class="sub u1">Webhook</text>

<!-- Stage 2: Checkout (blue) -->
<rect x="108" y="50" width="88" height="56" rx="8" class="box2"/>
<text x="152" y="72" text-anchor="middle" dominant-baseline="central" class="lbl t2">Checkout</text>
<text x="152" y="90" text-anchor="middle" dominant-baseline="central" class="sub u2">Git</text>

<!-- Stage 3: Build (purple) -->
<rect x="206" y="50" width="88" height="56" rx="8" class="box3"/>
<text x="250" y="72" text-anchor="middle" dominant-baseline="central" class="lbl t3">Build</text>
<text x="250" y="90" text-anchor="middle" dominant-baseline="central" class="sub u3">Docker</text>

<!-- Stage 4: Push (teal) -->
<rect x="304" y="50" width="88" height="56" rx="8" class="box4"/>
<text x="348" y="72" text-anchor="middle" dominant-baseline="central" class="lbl t4">Push</text>
<text x="348" y="90" text-anchor="middle" dominant-baseline="central" class="sub u4">Registry</text>

<!-- Stage 5: Deploy (coral) -->
<rect x="402" y="50" width="88" height="56" rx="8" class="box5"/>
<text x="446" y="72" text-anchor="middle" dominant-baseline="central" class="lbl t5">Deploy</text>
<text x="446" y="90" text-anchor="middle" dominant-baseline="central" class="sub u5">Ansible</text>

<!-- Stage 6: Smoke test (amber) -->
<rect x="500" y="50" width="88" height="56" rx="8" class="box6"/>
<text x="544" y="72" text-anchor="middle" dominant-baseline="central" class="lbl t6">Smoke test</text>
<text x="544" y="90" text-anchor="middle" dominant-baseline="central" class="sub u6">3 checks</text>

<!-- Stage arrows -->
<line x1="98"  y1="78" x2="108" y2="78" class="ln" marker-end="url(#arr)"/>
<line x1="196" y1="78" x2="206" y2="78" class="ln" marker-end="url(#arr)"/>
<line x1="294" y1="78" x2="304" y2="78" class="ln" marker-end="url(#arr)"/>
<line x1="392" y1="78" x2="402" y2="78" class="ln" marker-end="url(#arr)"/>
<line x1="490" y1="78" x2="500" y2="78" class="ln" marker-end="url(#arr)"/>

<!-- Fork connector from smoke test right edge (588) -->
<line x1="588" y1="78" x2="596" y2="78" class="ln"/>
<!-- Vertical spine from success center (y=48) to rollback center (y=108) -->
<line x1="596" y1="48" x2="596" y2="108" class="ln"/>
<!-- Arrow to Success -->
<line x1="596" y1="48" x2="604" y2="48" class="ln" marker-end="url(#arr)"/>
<!-- Arrow to Rollback -->
<line x1="596" y1="108" x2="604" y2="108" class="ln" marker-end="url(#arr)"/>

<!-- Success (green) -->
<rect x="604" y="28" width="70" height="40" rx="8" class="box7"/>
<text x="639" y="44" text-anchor="middle" dominant-baseline="central" class="lbl t7">Success</text>
<text x="639" y="59" text-anchor="middle" dominant-baseline="central" class="sub u7">Build live</text>

<!-- Rollback (red) -->
<rect x="604" y="88" width="70" height="40" rx="8" class="box8"/>
<text x="639" y="104" text-anchor="middle" dominant-baseline="central" class="lbl t8">Rollback</text>
<text x="639" y="119" text-anchor="middle" dominant-baseline="central" class="sub u8">Prev build</text>

<!-- Footnote -->
<text x="340" y="155" text-anchor="middle" class="note">Audit log written at deploy, smoke test, and rollback  —  /var/log/app/deployments.log</text>
</svg>
